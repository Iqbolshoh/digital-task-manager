<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Digital Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">🧠 TaskFlow</div>
  <nav>
    <a href="#">Home</a>
    <a href="#app">App</a>
    <a href="#about">About</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Organize Your Life Smartly</h1>

<section id="app" class="app-box">

  <ul id="taskList"></ul>
</section>

<footer>
