<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TaskNova - Digital Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">✨ TaskNova</div>
  <nav>
    <a href="#">Home</a>
    <a href="#app">App</a>
    <a href="#about">About</a>
  </nav>
</header>

<section class="hero">
  <h1>Manage Tasks Like a Pro</h1>
  <p>Fast, beautiful and modern productivity tool</p>
  <button class="btn">Get Started</button>
</section>

<section id="app" class="card">
  <h2>📋 Your Workspace</h2>

  <div class="input-box">
    <input id="taskInput" placeholder="Enter your task..." />
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>
</section>

<footer>
  <p>© 2026 TaskNova. Built for productivity 🚀</p>
</footer>

<script src="script.js"></script>
</body>
</html>
